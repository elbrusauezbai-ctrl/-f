<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Tion | Суретті тест</title>
    <style>
:root {
    --bg: #f8fafc;
    --primary: #3b82f6;
    --white: #ffffff;
    --text: #1e293b;
    --success: #22c55e;
    --error: #ef4444;
    --shadow: 0 10px 25px rgba(0,0,0,0.05);
}
body.dark {
    --bg: #0f172a;
    --white: #1e293b;
    --text: #e2e8f0;
    --shadow: 0 10px 25px rgba(0,0,0,0.3);
}
body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    transition: 0.2s;
}
.app-container {
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
}
.hidden { display: none; }
.screen { animation: fadeIn 0.3s ease-out; }
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
header { text-align: center; margin-bottom: 40px; }
header h1 {
    background: linear-gradient(135deg, #3b82f6, #1e40af);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-size: 3rem;
    letter-spacing: -1px;
    margin: 0;
}
header p { color: #64748b; }
.menu-card, .result-card {
    background: var(--white);
    padding: 40px;
    border-radius: 32px;
    box-shadow: var(--shadow);
}
.grid-menu {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 30px;
}
button {
    padding: 14px 18px;
    border: none;
    border-radius: 24px;
    background: var(--primary);
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}
button:hover {
    background: #2563eb;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(59,130,246,0.3);
}
.option-item {
    background: var(--white);
    border-radius: 24px;
    border: 2px solid #e2e8f0;
    cursor: pointer;
    transition: 0.2s;
    margin-bottom: 0px;
    overflow: hidden;
    padding: 20px;
}
.option-item:hover {
    border-color: var(--primary);
    background: #f8fafc;
    transform: translateX(4px);
}
.option-img {
    width: 100%;
    max-height: 180px;
    object-fit: contain;
    border-radius: 16px;
    margin-bottom: 12px;
    background: #f1f5f9;
    padding: 8px;
    cursor: pointer;
}
.option-text {
    font-size: 1rem;
    font-weight: 500;
    display: block;
    text-align: center;
}
.correct {
    background: #dcfce7 !important;
    border-color: var(--success) !important;
    color: #166534;
}
.wrong {
    background: #fee2e2 !important;
    border-color: var(--error) !important;
    color: #991b1b;
}
.question-image {
    margin: 20px 0;
    text-align: center;
    background: #f1f5f9;
    padding: 16px;
    border-radius: 24px;
}
.question-image img {
    max-width: 100%;
    max-height: 320px;
    border-radius: 16px;
    cursor: pointer;
}
.progress-bar { display: none; }
.contact-footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid #e2e8f0;
    text-align: center;
}
.contact-link {
    display: inline-block;
    font-size: 1.2rem;
    font-weight: 600;
    color: #3b82f6;
    text-decoration: none;
    margin: 0 15px;
}
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}
.modal-content {
    max-width: 90%;
    max-height: 90%;
    border-radius: 16px;
}
.close-modal {
    position: absolute;
    top: 20px;
    right: 35px;
    color: white;
    font-size: 40px;
    cursor: pointer;
}
.dark-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--primary);
    border-radius: 50%;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    z-index: 100;
}
.dark-toggle i { font-size: 24px; color: white; }
.result-details {
    margin-top: 20px;
    max-height: 400px;
    overflow-y: auto;
    text-align: left;
    background: var(--white);
    border-radius: 16px;
    padding: 15px;
}
.detail-item {
    padding: 8px;
    border-bottom: 1px solid #e2e8f0;
    font-size: 14px;
}
.detail-correct { color: var(--success); font-weight: bold; }
.detail-wrong { color: var(--error); font-weight: bold; }

/* ===== Нәтиже бетіндегі батырмаларды түзету ===== */
.result-card .button-group {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin: 30px 0 20px;
}
.result-card .button-group button {
    margin: 0 !important;
    border-radius: 60px !important;
    padding: 12px 28px !important;
    min-width: 180px;
    background: var(--primary);
    border: none;
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}
.result-card .button-group button:hover {
    background: #2563eb;
    transform: translateY(-2px);
}
@media (max-width: 550px) {
    .result-card .button-group button {
        min-width: unset;
        width: 100%;
        max-width: 280px;
    }
}
</style>

    const BLOCK_SIZE = 25;
    const TOTAL_BLOCKS = Math.ceil(quizData.length / BLOCK_SIZE);
    let currentQuestions = [], currentIndex = 0, score = 0, userAnswers = [], enterHandler = null;

    function toggleDarkMode() {
        document.body.classList.toggle('dark');
    }
    function enableEnterToNext() {
        if (enterHandler) document.removeEventListener('keydown', enterHandler);
        enterHandler = function(e) {
            if (e.key === 'Enter') {
                const btn = document.getElementById('next-btn');
                if (btn && !btn.classList.contains('hidden')) {
                    e.preventDefault(); loadNextQuestion();
                }
            }
        };
        document.addEventListener('keydown', enterHandler);
    }
    function buildBlockButtons() {
        const container = document.getElementById('block-list');
        container.innerHTML = '';
        for (let i = 0; i < TOTAL_BLOCKS; i++) {
            const start = i * BLOCK_SIZE + 1, end = Math.min((i+1)*BLOCK_SIZE, quizData.length);
            const btn = document.createElement('button');
            btn.textContent = `${start} - ${end}`;
            btn.onclick = () => initQuiz(i);
            container.appendChild(btn);
        }
    }
    function initQuiz(blockIdx) {
        const start = blockIdx * BLOCK_SIZE, end = Math.min(start + BLOCK_SIZE, quizData.length);
        currentQuestions = [];
        for (let i = start; i < end; i++) {
            const q = quizData[i];
            const shuffledVariants = [...q.variants].sort(() => Math.random() - 0.5);
            currentQuestions.push({
                id: q.id, text: q.question, correct: q.correct, variants: shuffledVariants, image: q.image || null
            });
        }
        for (let i = currentQuestions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i+1));
            [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
        }
        currentIndex = 0; score = 0; userAnswers = new Array(currentQuestions.length).fill(null);
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        showQuestion();
        enableEnterToNext();
    }
    function openModal(src) {
        document.getElementById('imageModal').style.display = 'flex';
        document.getElementById('modalImg').src = src;
    }
    document.querySelector('.close-modal').onclick = () => document.getElementById('imageModal').style.display = 'none';
    window.onclick = (e) => { if (e.target === document.getElementById('imageModal')) document.getElementById('imageModal').style.display = 'none'; };
    function showQuestion() {
        const q = currentQuestions[currentIndex];
        document.getElementById('q-text').innerText = q.text;
        document.getElementById('progress-text').innerText = `Сұрақ: ${currentIndex+1}/${currentQuestions.length}`;
        const imgContainer = document.getElementById('question-image-container');
        imgContainer.innerHTML = '';
        if (q.image) {
            const div = document.createElement('div'); div.className = 'question-image';
            const img = document.createElement('img'); img.src = q.image; img.style.cursor = 'pointer';
            img.onclick = () => openModal(q.image);
            div.appendChild(img); imgContainer.appendChild(div);
        }
        const container = document.getElementById('options-list');
        container.innerHTML = '';
        const saved = userAnswers[currentIndex];
        q.variants.forEach(v => {
            const div = document.createElement('div'); div.className = 'option-item';
            if (v.image) {
                const img = document.createElement('img'); img.src = v.image; img.className = 'option-img';
                img.onclick = (e) => { e.stopPropagation(); openModal(v.image); };
                div.appendChild(img);
            }
            const span = document.createElement('span'); span.className = 'option-text'; span.innerText = v.text;
            div.appendChild(span);
            if (saved !== null) {
                if (v.text === q.correct) div.classList.add('correct');
                else if (v.text === saved) div.classList.add('wrong');
                div.style.pointerEvents = 'none';
            } else {
                div.onclick = () => checkAnswer(div, v.text, q.correct);
            }
            container.appendChild(div);
        });
        const nextBtn = document.getElementById('next-btn');
        if (saved !== null) nextBtn.classList.remove('hidden'); else nextBtn.classList.add('hidden');
        enableEnterToNext();
    }
    function checkAnswer(el, selected, correct) {
        const allOptions = document.querySelectorAll('.option-item');
        allOptions.forEach(opt => opt.style.pointerEvents = 'none');
        if (selected === correct) {
            el.classList.add('correct'); score++;
        } else {
            el.classList.add('wrong');
            allOptions.forEach(opt => { if (opt.innerText.trim() === correct) opt.classList.add('correct'); });
        }
        userAnswers[currentIndex] = selected;
        document.getElementById('next-btn').classList.remove('hidden');
        enableEnterToNext();
    }
    function loadNextQuestion() {
        if (currentIndex + 1 < currentQuestions.length) {
            currentIndex++; showQuestion();
        } else {
            showResults();
        }
    }
    function showResults() {
        if (enterHandler) { document.removeEventListener('keydown', enterHandler); enterHandler = null; }
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score}/${currentQuestions.length}`;
        let percent = (score/currentQuestions.length)*100;
        let msg = percent>=90?"Тамаша!":percent>=70?"Жақсы!":percent>=50?"Орташа":"Қайталаңыз";
        document.getElementById('result-message').innerText = msg;
        const detailsDiv = document.getElementById('result-details');
        detailsDiv.innerHTML = '<h4>Сұрақтар бойынша нәтиже:</h4>';
        currentQuestions.forEach((q, idx) => {
            const userAns = userAnswers[idx];
            const isCorrect = (userAns === q.correct);
            const div = document.createElement('div');
            div.className = 'detail-item';
            div.innerHTML = `<b>${idx+1}.</b> ${q.text.substring(0,80)}... <span class="${isCorrect?'detail-correct':'detail-wrong'}">${isCorrect?'✓ Дұрыс':'✗ Бұрыс'}</span><br><small>Дұрыс жауап: ${q.correct}</small>`;
            detailsDiv.appendChild(div);
        });
        const retryBtn = document.getElementById('retry-wrong-btn');
        retryBtn.classList.remove('hidden');
        retryBtn.onclick = () => retryWrongQuestions();
    }
    function retryWrongQuestions() {
        const wrong = currentQuestions.filter((_, idx) => userAnswers[idx] !== currentQuestions[idx].correct);
        if (wrong.length === 0) {
            alert("Барлық жауаптар дұрыс!");
            return;
        }
        currentQuestions = wrong.map(q => ({ ...q, variants: [...q.variants].sort(() => Math.random()-0.5) }));
        currentIndex = 0; score = 0; userAnswers = new Array(currentQuestions.length).fill(null);
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
        enableEnterToNext();
    }
    function restartQuiz() {
        if (enterHandler) { document.removeEventListener('keydown', enterHandler); enterHandler = null; }
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('home-screen').classList.remove('hidden');
    }
    document.getElementById('next-btn').onclick = loadNextQuestion;
    buildBlockButtons();
</script>
